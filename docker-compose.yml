services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: maison-valery:latest
    container_name: maison-valery
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: maison-valery-api:latest
    container_name: maison-valery-api
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-valery2026}
    volumes:
      - maison_data:/data
    restart: unless-stopped

volumes:
  maison_data:
